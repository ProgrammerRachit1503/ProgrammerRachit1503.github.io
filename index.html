<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working in Progress</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        .container {
            text-align: center;
        }

        .triangle-image {
            width: 15vw;
            height: auto;
            margin: 0 auto;
        }

        .loading-circle {
            margin: 20px auto;
            width: 40px;
            height: 40px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .text {
            font-size: 18px;
            color: #333;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Replace 'yellow-triangle.png' with the path to your yellow triangle image -->
        <img src="/Images/work in progress.png" alt="Work In Progress" class="triangle-image">
        <div class="loading-circle"></div>
        <div class="text">Working in Progress...</div>
    </div>
</body>
</html>
